<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PostAIs</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
      }

      #boot-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 18% 14%, rgba(205, 166, 97, 0.32), transparent 30%),
          linear-gradient(135deg, #f6f0e7 0%, #e8dfd0 48%, #dcd4ca 100%);
        color: #1f2521;
        font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
        transition: opacity 220ms ease, visibility 220ms ease;
      }

      #boot-loader.boot-loader-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .boot-loader-card {
        width: min(520px, calc(100vw - 2.2rem));
        border: 1px solid rgba(31, 37, 33, 0.1);
        border-radius: 20px;
        background: rgba(255, 251, 244, 0.88);
        box-shadow: 0 18px 40px rgba(73, 55, 28, 0.12);
        padding: 1rem;
        display: grid;
        gap: 0.55rem;
      }

      .boot-loader-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }

      .boot-loader-title {
        margin: 0;
        font-size: 1rem;
        font-weight: 700;
      }

      .boot-loader-percent {
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }

      .boot-loader-track {
        height: 10px;
        border-radius: 999px;
        background: rgba(31, 37, 33, 0.12);
        overflow: hidden;
      }

      .boot-loader-fill {
        height: 100%;
        width: 0%;
        border-radius: inherit;
        background: linear-gradient(90deg, #1f5f4d, #d8b475);
        transition: width 120ms ease;
      }

      .boot-loader-note {
        margin: 0;
        color: rgba(31, 37, 33, 0.7);
        font-size: 0.88rem;
      }
    </style>
  </head>
  <body>
    <div id="boot-loader" aria-live="polite" aria-label="Cargando PostAIs">
      <div class="boot-loader-card">
        <div class="boot-loader-head">
          <p class="boot-loader-title">Inicializando PostAIs</p>
          <span id="boot-loader-percent" class="boot-loader-percent">0%</span>
        </div>
        <div class="boot-loader-track">
          <div id="boot-loader-fill" class="boot-loader-fill"></div>
        </div>
        <p id="boot-loader-note" class="boot-loader-note">Preparando interfaz...</p>
      </div>
    </div>
    <div id="root"></div>
    <script>
      (function () {
        var progress = 0;
        var completed = false;
        var fill = document.getElementById('boot-loader-fill');
        var percent = document.getElementById('boot-loader-percent');
        var note = document.getElementById('boot-loader-note');
        var overlay = document.getElementById('boot-loader');

        function paint(nextValue) {
          var value = Math.max(0, Math.min(100, nextValue));
          progress = value;

          if (fill) {
            fill.style.width = value + '%';
          }

          if (percent) {
            percent.textContent = Math.round(value) + '%';
          }
        }

        function finish() {
          if (completed) {
            return;
          }

          completed = true;
          paint(100);

          if (note) {
            note.textContent = 'Interfaz lista';
          }

          window.setTimeout(function () {
            if (overlay) {
              overlay.classList.add('boot-loader-hidden');
            }
          }, 150);
        }

        var tick = window.setInterval(function () {
          if (completed) {
            window.clearInterval(tick);
            return;
          }

          if (progress < 70) {
            paint(progress + 6);
          } else if (progress < 88) {
            paint(progress + 2.2);
          } else if (progress < 94) {
            paint(progress + 0.8);
          }
        }, 100);

        window.addEventListener('postais:ui-ready', function () {
          finish();
          window.clearInterval(tick);
        });

        window.setTimeout(function () {
          if (!completed && note) {
            note.textContent = 'Cargando modulos...';
          }
        }, 2500);

        window.setTimeout(function () {
          if (!completed) {
            finish();
          }
        }, 15000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
