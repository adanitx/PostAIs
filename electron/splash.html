<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PostAIS</title>
    <style>
        :root {
            --midnight-0: #070a1d;
            --midnight-1: #0b1130;
            --midnight-2: #151c5f;
            --magenta-1: #cc2f9f;
            --magenta-2: #a72386;
            --indigo: #545aff;
            --text: #f4f7ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
        }

        body {
            background:
                radial-gradient(circle at 14% 18%, rgba(204, 47, 159, 0.28), transparent 33%),
                radial-gradient(circle at 84% 82%, rgba(84, 90, 255, 0.3), transparent 34%),
                linear-gradient(145deg, var(--midnight-0) 0%, var(--midnight-1) 48%, var(--midnight-2) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Plus Jakarta Sans', 'Avenir Next', 'Century Gothic', sans-serif;
            overflow: hidden;
            color: var(--text);
        }

        .splash-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--magenta-1) 0%, var(--indigo) 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            color: white;
            box-shadow: 0 10px 30px rgba(167, 35, 134, 0.38), 0 0 18px rgba(84, 90, 255, 0.24);
        }

        .app-name {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.5px;
            text-shadow: 0 4px 14px rgba(167, 35, 134, 0.25);
        }

        .app-tagline {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-top: 0.5rem;
            animation: fadeInDelayed 1s ease-out 0.3s both;
        }

        @keyframes fadeInDelayed {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .loading-section {
            width: 200px;
            margin-top: 1rem;
            animation: slideUp 0.8s ease-out 0.4s both;
        }

        .loading-bar {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            box-shadow: 0 0 12px rgba(204, 47, 159, 0.2);
        }

        .loading-progress {
            height: 100%;
            background: linear-gradient(90deg, var(--magenta-1) 0%, var(--indigo) 100%);
            border-radius: 2px;
            animation: loadingAnimation 2s ease-in-out infinite;
            box-shadow: 0 0 10px rgba(204, 47, 159, 0.5), 0 0 16px rgba(84, 90, 255, 0.34);
        }

        @keyframes loadingAnimation {
            0% {
                width: 0%;
            }
            50% {
                width: 100%;
            }
            100% {
                width: 100%;
            }
        }

        .loading-text {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.05em;
        }

        .glow {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
            filter: blur(40px);
        }

        .glow-1 {
            width: 300px;
            height: 300px;
            background: var(--magenta-1);
            top: -100px;
            left: -100px;
            animation: float 6s ease-in-out infinite;
        }

        .glow-2 {
            width: 300px;
            height: 300px;
            background: var(--indigo);
            bottom: -100px;
            right: -100px;
            animation: float 8s ease-in-out infinite 1s;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0);
            }
            50% {
                transform: translate(30px, 30px);
            }
        }
    </style>
</head>
<body>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    
    <div class="splash-container">
        <div class="logo-section">
            <div class="logo">P</div>
            <div>
                <div class="app-name">PostAIS</div>
                <div class="app-tagline">Inicializando...</div>
            </div>
        </div>
        
        <div class="loading-section">
            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>
            <div class="loading-text">Cargando interfaz</div>
        </div>
    </div>
</body>
</html>
